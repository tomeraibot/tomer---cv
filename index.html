<!DOCTYPE html>
<html lang="en" data-palette="ocean">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tomer Sahar — Interactive CV · Don't read it. Interview it.</title>
<meta name="description" content="The interactive CV of Tomer Sahar — product leader and AI strategy consultant. Read it, or interview it: an AI agent answers questions from verified CV facts.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Manrope:wght@400;500;600;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>
/* ============================================================
   DESIGN TOKENS — EDIT VISUALS HERE
   Palettes: "ocean" (default) | "chromatic" | "sunset"
   Card effect (SITE_CONFIG.cardEffect): "riso-offset" | "hard-edge" | "none"
   ============================================================ */
:root{
  --display:'Syne',sans-serif;
  --body:'Manrope',sans-serif;
  --mono:'JetBrains Mono',monospace;
  --radius-card:22px;
  --radius-pill:999px;
  --shadow-sheet:0 -18px 60px rgba(0,0,0,.5);
}
[data-palette="ocean"]{
  --bg:#050D1A; --bg-2:#0A1626; --ink:#071120; --paper:#F2F8FC;
  --text:#E8F2FB; --text-dim:#9DB6CE; --hairline:#1C3552;
  --c1a:#2DD4BF; --c1b:#0D9488;
  --c2a:#4C7DFF; --c2b:#2447D6;
  --c3a:#FF6E5E; --c3b:#E2402E;
  --c4a:#FFC94D; --c4b:#EAA20B;
  --accent:#4C7DFF; --accent-2:#2DD4BF; --signal:#FFC94D;
}
[data-palette="chromatic"]{
  --bg:#120A1F; --bg-2:#1C0F2E; --ink:#180D26; --paper:#FFF9F0;
  --text:#F4EFFA; --text-dim:#C9BCE6; --hairline:#3A2665;
  --c1a:#FF8E33; --c1b:#FF6A00;
  --c2a:#FF5C9E; --c2b:#F42179;
  --c3a:#4BE6F0; --c3b:#17BDD4;
  --c4a:#D6FF57; --c4b:#B3E81C;
  --accent:#8A5CFF; --accent-2:#FF3E8A; --signal:#C8F53B;
}
[data-palette="sunset"]{
  --bg:#160B14; --bg-2:#221019; --ink:#1E0F16; --paper:#FFF6EE;
  --text:#FBEEE4; --text-dim:#D9B8A8; --hairline:#4A2434;
  --c1a:#FFC24B; --c1b:#F59E0B;
  --c2a:#FF7B54; --c2b:#F04E23;
  --c3a:#FF4D8D; --c3b:#DB1F63;
  --c4a:#A78BFA; --c4b:#7C3AED;
  --accent:#FF7B54; --accent-2:#FF4D8D; --signal:#FFC24B;
}

/* Card effect (ported from the Claude Design "Ocean" export) */
body[data-card-effect="hard-edge"] .chapter{box-shadow:6px 6px 0 var(--ink)}
body[data-card-effect="riso-offset"] .chapter{
  box-shadow:3px 3px 0 color-mix(in srgb,var(--accent) 45%,transparent),
             -2px -2px 0 color-mix(in srgb,var(--accent-2) 38%,transparent)}

/* ============================================================
   BASE
   ============================================================ */
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--body);line-height:1.6;-webkit-font-smoothing:antialiased}
button{font-family:inherit}
:focus-visible{outline:2px solid var(--signal);outline-offset:2px}

/* ============================================================
   LAYOUT — one codebase, two compositions
   Mobile (<1024px): single column, hero on top, bottom-sheet agent.
   Desktop (≥1024px): sticky identity rail + content column + drawer.
   ============================================================ */
.layout{max-width:760px;margin:0 auto;padding:0 20px}
.rail{display:none}
@media(min-width:1024px){
  .layout{max-width:1240px;display:grid;grid-template-columns:340px minmax(0,1fr);gap:56px;padding:0 40px}
  .hero{display:none}
  .rail{display:flex;flex-direction:column;position:sticky;top:0;height:100vh;padding:64px 0 40px}
}

/* RAIL (desktop identity panel) */
.rail .eyebrow{margin-bottom:14px}
.rail h1{font-size:34px}
.rail .lede{font-size:14px;margin-top:14px}
.rail-nav{margin-top:38px;display:flex;flex-direction:column;gap:4px}
.rail-nav a{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:12px;
  text-decoration:none;color:var(--text-dim);font-weight:600;font-size:13.5px;transition:all .18s}
.rail-nav a .swatch{width:12px;height:12px;border-radius:4px;flex-shrink:0;transition:transform .18s}
.rail-nav a .yrs{margin-left:auto;font-family:var(--mono);font-size:9.5px;opacity:.6}
.rail-nav a:hover{color:var(--text);background:var(--bg-2)}
.rail-nav a.active{color:var(--text);background:var(--bg-2)}
.rail-nav a.active .swatch{transform:scale(1.35)}
.rail-nav a.hoodlink .swatch{background:conic-gradient(var(--c1b),var(--c2b),var(--c3b),var(--c4a),var(--c1b))}
.rail-foot{margin-top:auto;display:flex;flex-direction:column;gap:10px}
.rail-status{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);display:flex;align-items:center;gap:8px}
.rail-status .dot{width:8px;height:8px;border-radius:50%;background:var(--signal);animation:pulse 1.8s infinite}
.rail-links{display:flex;gap:14px;flex-wrap:wrap}
.rail-links a{font-size:12.5px;color:var(--text-dim);text-decoration:none;font-weight:600}
.rail-links a:hover{color:var(--signal)}

/* HERO (mobile) */
.hero{padding:84px 0 44px}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent-2);margin-bottom:16px}
h1{font-family:var(--display);font-weight:800;font-size:clamp(36px,7vw,64px);line-height:1.02;letter-spacing:-.02em}
h1 .w1{color:var(--c1a)} h1 .w2{color:var(--c2a)} h1 .w3{color:var(--c4a)}
.lede{margin:18px 0 0;color:var(--text-dim);font-size:clamp(14px,2vw,17px);line-height:1.65;font-weight:500;max-width:44ch}

/* CONTENT COLUMN */
.content{min-width:0}
@media(min-width:1024px){.content{padding-top:64px}}

/* CHAPTERS */
.chapters{padding:14px 0 30px;display:flex;flex-direction:column;gap:18px}
@media(min-width:1024px){.chapters{padding-top:0;gap:24px}}
.chapter{border-radius:var(--radius-card);padding:24px 22px 20px;color:var(--ink);position:relative;overflow:hidden;scroll-margin-top:24px}
.chapter[data-hue="1"]{background:linear-gradient(160deg,var(--c1a),var(--c1b))}
.chapter[data-hue="2"]{background:linear-gradient(160deg,var(--c2a),var(--c2b))}
.chapter[data-hue="3"]{background:linear-gradient(160deg,var(--c3a),var(--c3b))}
.chapter[data-hue="4"]{background:linear-gradient(160deg,var(--c4a),var(--c4b))}
@media(min-width:1024px){.chapter{padding:30px 28px 24px}}
.ch-top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:4px}
.years{font-family:var(--mono);font-size:10px;font-weight:600;background:rgba(5,10,20,.85);color:#fff;padding:5px 11px;border-radius:var(--radius-pill);letter-spacing:.05em;white-space:nowrap}
h2{font-family:var(--display);font-weight:800;font-size:clamp(22px,3.4vw,28px);letter-spacing:-.01em;line-height:1.05}
.role{font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin:5px 0 12px;opacity:.75}
.summary{font-size:clamp(13.5px,1.8vw,15px);line-height:1.62;font-weight:600;max-width:62ch}

.more{max-height:0;overflow:hidden;transition:max-height .55s cubic-bezier(.4,0,.2,1)}
.chapter.expanded .more{max-height:1400px}
.more-inner{padding-top:16px;display:flex;flex-direction:column;gap:12px}
/* Desktop: depth blocks sit side by side — real screen real estate use */
@media(min-width:1024px){
  .more-inner{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));align-items:stretch}
}
.block{background:rgba(250,252,255,.93);border-radius:14px;padding:15px 16px}
.block h3{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;font-weight:600;margin-bottom:7px;opacity:.6}
.block p{font-size:13px;line-height:1.62;font-weight:500}
.block ul{list-style:none;font-size:13px;line-height:1.6;font-weight:500}
.block li{padding-left:16px;position:relative;margin-bottom:6px}
.block li::before{content:"→";position:absolute;left:0;font-weight:800}

.ch-actions{display:flex;gap:8px;margin-top:15px;flex-wrap:wrap;align-items:center}
.expand-btn{font-family:var(--display);font-size:11.5px;font-weight:700;background:var(--ink);color:#fff;
  border:none;border-radius:var(--radius-pill);padding:11px 18px;cursor:pointer;letter-spacing:.02em}
.chapter.expanded .expand-btn .lbl-open{display:none}
.chapter:not(.expanded) .expand-btn .lbl-close{display:none}
.chip{font-family:var(--body);font-size:12px;font-weight:800;background:rgba(250,252,255,.9);border:none;border-radius:var(--radius-pill);
  padding:11px 16px;cursor:pointer;color:var(--ink);transition:transform .12s}
.chip:hover{transform:translateY(-1px)}
.chip:active,.chip.asked{transform:scale(.96);outline:2px solid var(--ink)}

/* UNDER THE HOOD */
.hood-cta-zone{padding:26px 0 40px;display:flex;flex-direction:column;align-items:center;gap:14px;scroll-margin-top:24px}
.hood-tease{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim)}
.hood-btn{position:relative;border:none;background:var(--bg-2);color:var(--text);cursor:pointer;
  font-family:var(--display);font-weight:800;font-size:clamp(15px,2.4vw,19px);letter-spacing:.01em;
  padding:20px 34px;border-radius:var(--radius-pill);isolation:isolate}
.hood-btn::before{content:"";position:absolute;inset:-3px;border-radius:inherit;z-index:-1;
  background:conic-gradient(from var(--spin,0deg),var(--c1b),var(--c2b),var(--c3b),var(--c4a),var(--c1b));
  animation:spin 3.5s linear infinite}
@property --spin{syntax:'<angle>';initial-value:0deg;inherits:false}
@keyframes spin{to{--spin:360deg}}
.hood-btn .sub{display:block;font-family:var(--mono);font-weight:400;font-size:10px;letter-spacing:.12em;
  text-transform:uppercase;color:var(--text-dim);margin-top:5px}
.hood-btn:hover{background:var(--ink)}

.hood-panel{max-height:0;overflow:hidden;transition:max-height .6s cubic-bezier(.4,0,.2,1)}
.hood-panel.open{max-height:3200px}
.hood-inner{border:1px solid var(--hairline);border-radius:var(--radius-card);background:var(--bg-2);
  padding:26px 22px;margin-bottom:44px}
@media(min-width:1024px){.hood-inner{padding:34px 32px}}
.hood-inner h2{color:var(--text);font-size:clamp(20px,3vw,26px);margin-bottom:6px}
.hood-inner .hood-sub{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent-2);margin-bottom:20px}
.hood-sec{margin-bottom:22px}
.hood-sec h3{font-family:var(--display);font-weight:700;font-size:15px;color:var(--signal);margin-bottom:8px}
.hood-sec p{font-size:13.5px;color:var(--text-dim);font-weight:500;max-width:64ch}
.hood-sec ul{list-style:none;font-size:13.5px;color:var(--text-dim);font-weight:500}
.hood-sec li{padding-left:18px;position:relative;margin-bottom:7px}
.hood-sec li::before{content:"▸";position:absolute;left:0;color:var(--accent)}
.diagram{font-family:var(--mono);font-size:11px;line-height:1.7;color:var(--text-dim);background:var(--bg);
  border:1px solid var(--hairline);border-radius:12px;padding:16px;overflow-x:auto;white-space:pre}
.diagram b{color:var(--signal);font-weight:600}
.stack-tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.tag{font-family:var(--mono);font-size:10.5px;font-weight:600;border:1px solid var(--hairline);
  color:var(--text-dim);padding:6px 12px;border-radius:var(--radius-pill)}

/* FOOTER (mobile-focused; desktop has the rail) */
footer{border-top:1px solid var(--hairline);padding:34px 0 120px}
footer .f-title{font-family:var(--display);font-weight:800;font-size:20px;margin-bottom:8px}
footer p, footer a{font-size:13.5px;color:var(--text-dim);font-weight:500;text-decoration:none}
footer a:hover{color:var(--signal)}
.f-links{display:flex;gap:18px;margin-top:10px;flex-wrap:wrap}
.f-note{font-family:var(--mono);font-size:10px;margin-top:22px;color:var(--text-dim);opacity:.7}
@media(min-width:1024px){footer{padding-bottom:60px}}

/* AGENT FAB */
.agent-fab{position:fixed;bottom:22px;right:18px;z-index:60;display:flex;align-items:center;gap:9px;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;border:none;border-radius:var(--radius-pill);
  padding:15px 22px;cursor:pointer;box-shadow:0 10px 32px rgba(0,0,0,.45);
  font-family:var(--display);font-size:13px;font-weight:700;letter-spacing:.02em}
@media(min-width:1024px){.agent-fab{bottom:32px;right:32px}}
.agent-fab .dot{width:10px;height:10px;border-radius:50%;background:var(--signal);animation:pulse 1.8s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 color-mix(in srgb,var(--signal) 55%,transparent)}50%{box-shadow:0 0 0 9px transparent}}

/* AGENT SHEET / DRAWER */
.scrim{position:fixed;inset:0;background:rgba(2,5,12,.5);opacity:0;pointer-events:none;transition:opacity .3s;z-index:65}
.scrim.on{opacity:1;pointer-events:auto}
.sheet{position:fixed;z-index:70;background:var(--paper);color:var(--ink);display:flex;flex-direction:column;
  transition:transform .45s cubic-bezier(.32,.72,0,1)}
@media(max-width:1023px){
  .sheet{left:0;right:0;bottom:0;height:66%;border-radius:28px 28px 0 0;box-shadow:var(--shadow-sheet);transform:translateY(112%)}
  .sheet.open{transform:translateY(0)}
}
@media(min-width:1024px){
  .sheet{top:0;right:0;bottom:0;width:440px;border-radius:0;box-shadow:-24px 0 60px rgba(0,0,0,.4);transform:translateX(110%)}
  .sheet.open{transform:translateX(0)}
  .grabber{display:none}
}
.grabber{width:46px;height:6px;border-radius:var(--radius-pill);background:#C5D5E4;margin:12px auto 6px;flex-shrink:0}
.sheet-head{padding:14px 20px;border-bottom:1px solid #DCE7F1;display:flex;justify-content:space-between;align-items:center}
.sheet-title{font-family:var(--display);font-weight:800;font-size:16px}
.sheet-ctx{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);font-weight:600;margin-top:3px}
.close{background:none;border:1.5px solid #C5D5E4;border-radius:50%;width:32px;height:32px;cursor:pointer;color:#5E7891;font-weight:700}
.sheet-thread{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:13px}
.msg{max-width:90%;font-size:13.5px;line-height:1.62;font-weight:500}
.msg.user{align-self:flex-end;background:var(--ink);color:#fff;padding:11px 15px;border-radius:16px 16px 4px 16px;font-weight:600}
.msg.agent .who{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:5px}
.msg.agent .bubble{background:#fff;border:1.5px solid #DCE7F1;padding:13px 15px;border-radius:4px 16px 16px 16px}
.typing{display:inline-flex;gap:4px}
.typing span{width:6px;height:6px;border-radius:50%;background:#8AA3BC;animation:ty 1s infinite}
.typing span:nth-child(2){animation-delay:.15s}.typing span:nth-child(3){animation-delay:.3s}
@keyframes ty{40%{transform:translateY(-4px)}}
.sheet-composer{border-top:1px solid #DCE7F1;padding:12px 16px calc(14px + env(safe-area-inset-bottom));display:flex;gap:8px}
.sheet-composer input{flex:1;border:1.5px solid #C5D5E4;border-radius:var(--radius-pill);padding:12px 16px;font-size:13.5px;font-family:var(--body);font-weight:600;background:#fff;color:var(--ink)}
.sheet-composer input:focus{outline:none;border-color:var(--accent)}
.sheet-composer .send{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;border:none;border-radius:var(--radius-pill);padding:0 18px;font-weight:800;cursor:pointer}

@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>

<div class="layout">

  <!-- DESKTOP IDENTITY RAIL (hidden on mobile) -->
  <aside class="rail" aria-label="Profile and navigation">
    <div class="eyebrow" id="railEyebrow"></div>
    <h1 id="railTitle"></h1>
    <p class="lede" id="railLede"></p>
    <nav class="rail-nav" id="railNav" aria-label="Chapters"></nav>
    <div class="rail-foot">
      <div class="rail-status"><span class="dot"></span><span>Agent online · ask anything</span></div>
      <div class="rail-links" id="railLinks"></div>
    </div>
  </aside>

  <div class="content">
    <!-- MOBILE HERO (hidden on desktop) -->
    <header class="hero">
      <div class="eyebrow" id="heroEyebrow"></div>
      <h1 id="heroTitle"></h1>
      <p class="lede" id="heroLede"></p>
    </header>

    <section class="chapters" id="chapters" aria-label="Career chapters"></section>

    <section class="hood-cta-zone" id="hood">
      <div class="hood-tease">Curious how this CV works?</div>
      <button class="hood-btn" id="hoodBtn" aria-expanded="false" aria-controls="hoodPanel">
        ⚙ Under the Hood
        <span class="sub">Technical deep-dive · for the advanced reader</span>
      </button>
    </section>

    <section class="hood-panel" id="hoodPanel" aria-label="How this CV works"></section>

    <footer id="footer"></footer>
  </div>
</div>

<button class="agent-fab" id="fab" aria-haspopup="dialog"><span class="dot"></span><span id="fabLabel">Ask me</span></button>

<div class="scrim" id="scrim"></div>
<aside class="sheet" id="sheet" role="dialog" aria-label="CV agent">
  <div class="grabber"></div>
  <div class="sheet-head">
    <div>
      <div class="sheet-title" id="sheetTitle"></div>
      <div class="sheet-ctx" id="ctx"></div>
    </div>
    <button class="close" id="close" aria-label="Close agent">✕</button>
  </div>
  <div class="sheet-thread" id="thread"></div>
  <div class="sheet-composer">
    <input type="text" id="composerInput" placeholder="" aria-label="Ask the agent">
    <button class="send" id="sendBtn">ASK</button>
  </div>
</aside>

<script>
/* ============================================================
   SITE CONFIG — EDIT BEHAVIOR HERE
   ============================================================ */
const SITE_CONFIG = {
  agent: {
    mode: "demo",                    // "demo" | "live"
    endpoint: "/api/interview",
    name: "The Interview",
    greeting: "Every chapter here has more depth than what's on the surface. Tap a question on any chapter — or ask your own. I answer from verified CV facts only.",
    demoFreeTextReply: "In this preview I only answer the prepared questions — the live version connects to a RAG pipeline over Tomer's verified CV facts and can answer anything. Tap ⚙ Under the Hood to see how."
  },
  palette: "ocean",                  // ocean | chromatic | sunset
  cardEffect: "riso-offset"          // riso-offset | hard-edge | none
};

/* ============================================================
   CONTENT — EDIT ALL CV TEXT HERE  ([EDIT] = verify before launch)
   ============================================================ */
const CONTENT = {
  hero: {
    eyebrow: "Tomer Sahar / Curriculum Vitae",
    title: 'One career.<br><span class="w1">Four</span> <span class="w2">bold</span> <span class="w3">chapters.</span>',
    lede: "Each chapter has its own color, its own depth, and its own questions. Read the summary — or open it up and interview it."
  },

  chapters: [
    {
      id: "product-experts", hue: 1,
      title: "Product Experts", years: "2023—NOW",
      role: "Founder & CPO · AI Strategy",
      summary: "Founder-led consultancy taking organizations from AI experimentation to production — strategy, agentic architectures, and executive training.",
      more: {
        scope: "End-to-end ownership: from C-level AI roadmaps through hands-on architecture of agent platforms — dispatchers, approval gates, RAG pipelines, CI-gated autonomous workflows. Clients span marketing tech, HR tech, and enterprise training.",
        highlights: [
          "Operates a self-hosted production agent platform he built himself — the advice comes from running the real thing",
          "Designed and delivered advanced agentic-AI training programs for enterprise leadership teams",
          "Authored multi-month AI transformation roadmaps adopted at the executive level"
        ],
        story: "After a decade of building products, the consultancy was the answer to one question: how do you make AI adoption real rather than theatrical? The answer — build it yourself first, then teach it."
      },
      questions: [
        { q: "Does he build, or just advise?",
          a: "Both — and that's the point. He runs a self-hosted agent platform he built himself: dispatcher, approval gates, RAG pipeline, CI-gated autonomous PRs. The advice comes from operating the real thing in production." },
        { q: "Who are his clients?",
          a: "Organizations moving from AI experiments to production — executive teams needing an AI roadmap, companies building their first agent platforms. Recent work spans marketing tech, HR tech, and enterprise training." }
      ]
    },
    {
      id: "global-dev-experts", hue: 2,
      title: "Global Dev Experts", years: "2022—NOW",
      role: "COO · Operations at Scale",
      summary: "Operational leadership across delivery, hiring and process — the operator's counterweight to the strategist's role.",
      more: {
        scope: "Owns operational execution: delivery pipelines, team scaling, hiring frameworks, and the processes that let a services organization grow without breaking. Runs in parallel with the CPO role — strategy and operations informing each other daily.",
        highlights: [
          "Built delivery and hiring processes that scale across distributed teams",
          "Brings the operator's discipline into every AI strategy engagement — plans that survive contact with reality"
        ],
        story: "Strategists who never operate write beautiful plans that die on contact. Keeping both muscles active — CPO and COO — is deliberate."
      },
      questions: [
        { q: "How do the CPO and COO roles work together?",
          a: "They're deliberately complementary: Product Experts is where strategy and AI architecture happen; Global Dev Experts is where operational scale is executed. Each role keeps the other honest." }
      ]
    },
    {

const $ = id => document.getElementById(id);
const esc = s => s.replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

// Hero (mobile) + Rail (desktop) — same content, two compositions

$('heroLede').textContent = CONTENT.hero.lede;

/* ============================================================
   BEHAVIOR
   ============================================================ */
const sheet=$('sheet'), scrim=$('scrim'), thread=$('thread'), ctx=$('ctx');
const history=[];

function addMsg(role, html){
  const el=document.createElement('div');
  el.className='msg '+role;
  el.innerHTML = role==='user' ? esc(html)
    : `<div class="who">CV Agent</div><div class="bubble">${html}</div>`;
  thread.appendChild(el); thread.scrollTop=thread.scrollHeight;
  return el;
}
function openSheet(){sheet.classList.add('open');scrim.classList.add('on')}
function closeSheet(){sheet.classList.remove('open');scrim.classList.remove('on')}

addMsg('agent', esc(SITE_CONFIG.agent.greeting));

$('fab').addEventListener('click', openSheet);
$('close').addEventListener('click', closeSheet);
scrim.addEventListener('click', closeSheet);
document.addEventListener('keydown', e=>{if(e.key==='Escape')closeSheet()});

// Expand / collapse chapters
document.querySelectorAll('.expand-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    const ch=btn.closest('.chapter');
    const open=ch.classList.toggle('expanded');
    btn.setAttribute('aria-expanded', open);
  });
});

// Question chips → contextual agent
document.querySelectorAll('.chip').forEach(chBtn=>{
  chBtn.addEventListener('click', ()=>{
    document.querySelectorAll('.chip').forEach(c=>c.classList.remove('asked'));
    chBtn.classList.add('asked');
    const chapter=CONTENT.chapters.find(c=>c.id===chBtn.dataset.ch);
    const qa=chapter.questions[+chBtn.dataset.i];
    ctx.textContent='Context: '+chapter.title;
    askAgent(qa.q, chapter, qa.a);
  });
});

// Free text
function submitFreeText(){
  const input=$('composerInput'); const q=input.value.trim();
  if(!q) return; input.value='';
  askAgent(q, null, null);
}
$('sendBtn').addEventListener('click', submitFreeText);
$('composerInput').addEventListener('keydown', e=>{if(e.key==='Enter')submitFreeText()});

async function askAgent(question, chapter, cannedAnswer){
  openSheet();
  addMsg('user', question);
  const t=addMsg('agent','<span class="typing"><span></span><span></span><span></span></span>');
  history.push({role:'user', content:question});

  let answer;
  if(SITE_CONFIG.agent.mode==='demo'){
    await new Promise(r=>setTimeout(r,700));
    answer = cannedAnswer || SITE_CONFIG.agent.demoFreeTextReply;
  } else {
    try{
      const res=await fetch(SITE_CONFIG.agent.endpoint,{
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({question, context:chapter?chapter.id:'full-cv', history:history.slice(-10)})
      });
      const data=await res.json();
      answer=data.answer || "Something went sideways on my end — try again in a moment.";
    }catch(e){
      answer="I can't reach the agent backend right now. The static CV above still tells the whole story — or try again shortly.";
    }
  }
  history.push({role:'assistant', content:answer});
  t.querySelector('.bubble').innerHTML=esc(answer);
  thread.scrollTop=thread.scrollHeight;
}

// Under the Hood toggle
$('hoodBtn').addEventListener('click', ()=>{
  const panel=$('hoodPanel');
  const open=panel.classList.toggle('open');
  $('hoodBtn').setAttribute('aria-expanded', open);
  if(open) setTimeout(()=>panel.scrollIntoView({behavior:'smooth',block:'start'}),150);
});

// Desktop rail scrollspy
const navLinks=[...document.querySelectorAll('.rail-nav a')];
if('IntersectionObserver' in window && navLinks.length){
  const targets=navLinks.map(a=>document.getElementById(a.dataset.target)).filter(Boolean);
  const spy=new IntersectionObserver(entries=>{
    entries.forEach(en=>{
      if(en.isIntersecting){
        navLinks.forEach(a=>a.classList.toggle('active', a.dataset.target===en.target.id));
      }
    });
  },{rootMargin:'-30% 0px -55% 0px'});
  targets.forEach(t=>spy.observe(t));
}
</script>
