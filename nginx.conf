# cv-app nginx — static site + /api/interview proxy to the cv_interview
# container (ai-stack compose project, same ai_stack_git_edge network).
# Included by nginx:alpine inside the http{} context as conf.d/default.conf.

# 10 req/min per client IP on the interview endpoint (runbook Phase 2).
limit_req_zone $binary_remote_addr zone=interview:1m rate=10r/m;

server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    location /api/interview {
        # Resolve at request time via Docker's embedded DNS, through a
        # variable — nginx then starts (and the static site stays up) even
        # when cv_interview is absent; requests just 502 until it exists.
        resolver 127.0.0.11 valid=10s;
        set $cv_interview_upstream cv_interview:8091;
        proxy_pass http://$cv_interview_upstream;

        limit_req zone=interview burst=5 nodelay;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
